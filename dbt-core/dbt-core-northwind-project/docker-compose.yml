version: "3"

services:
  db:
    image: postgres:16.13
    container_name: northwind-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: northwind
      POSTGRES_USER: northwind
      POSTGRES_PASSWORD: northwind
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - northwind-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U northwind -d northwind" ]
      interval: 10s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: northwind-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_root_prefs:/root/.pgadmin
      - pgadmin_working_dir:/var/lib/pgadmin
    networks:
      - northwind-network

  dbt-core:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    container_name: northwind-dbt
    working_dir: /usr/app/northwind
    ports:
      - "8080:8080"
    volumes:
      - ./:/usr/app
      - ./profiles.yml:/root/.dbt/profiles.yml:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - northwind-network
    entrypoint: [ "/bin/bash", "-lc" ]
    command: [ "sleep infinity" ]

networks:
  northwind-network:
    driver: bridge

volumes:
  pgadmin_root_prefs:
    driver: local
  pgadmin_working_dir:
    driver: local
  postgresql_data:
    driver: local
